name: Update cost dashboard

on:
  schedule:
    - cron: "0 6 * * *" # daily 06:00 UTC (billing data for yesterday has landed)
  workflow_dispatch:
    inputs:
      start:
        description: "Backfill start day YYYY-MM-DD (optional; default = previous month start)"
        required: false
      end:
        description: "Backfill end day YYYY-MM-DD, exclusive (optional; default = tomorrow)"
        required: false
  push:
    branches: [main]
    paths: ["web/**", "internal/**", "cmd/**", "data/**"]

permissions:
  contents: write # commit updated data/ back to the repo
  pages: write # deploy to GitHub Pages
  id-token: write # OIDC for Pages (and optional GCP WIF)

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    # secrets are not available in step-level `if:` expressions, so map them to
    # job env once and gate steps on `env.* != ''` instead.
    #
    # Collection/commit only happens on schedule or manual dispatch; a plain
    # push just rebuilds and redeploys the page from the committed data.
    env:
      COLLECT: ${{ github.event_name != 'push' }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: us-east-1
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      GOOGLE_CLOUD_PROJECT: kubernetes-public
      DIGITALOCEAN_TOKEN: ${{ secrets.DIGITALOCEAN_TOKEN }}
      IBMCLOUD_API_KEY: ${{ secrets.IBMCLOUD_API_KEY }}
      IBM_Z_API_KEY: ${{ secrets.IBM_Z_API_KEY }}
      FASTLY_API_TOKEN: ${{ secrets.FASTLY_API_TOKEN }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      # ---- date window: previous month start .. tomorrow (catches late-landing
      # costs), or the manual backfill range from workflow_dispatch inputs.
      - name: Compute collection window
        id: win
        run: |
          if [ -n "${{ github.event.inputs.start }}" ]; then
            START="${{ github.event.inputs.start }}"
          else
            START="$(date -u -d "$(date -u +%Y-%m-01) -1 month" +%Y-%m-%d)"
          fi
          if [ -n "${{ github.event.inputs.end }}" ]; then
            END="${{ github.event.inputs.end }}"
          else
            END="$(date -u -d tomorrow +%Y-%m-%d)"
          fi
          echo "start=$START" >> "$GITHUB_OUTPUT"
          echo "end=$END" >> "$GITHUB_OUTPUT"
          echo "prev_month=$(date -u -d "$(date -u +%Y-%m-01) -1 month" +%Y-%m)" >> "$GITHUB_OUTPUT"
          echo "cur_month=$(date -u +%Y-%m)" >> "$GITHUB_OUTPUT"
          # Month list [START .. END-1day] for the per-month GCP collector.
          cy=$(date -u -d "$START" +%Y); cm=$(date -u -d "$START" +%m)
          ly=$(date -u -d "$END -1 day" +%Y); lm=$(date -u -d "$END -1 day" +%m)
          months=""
          while [ $((10#$cy * 12 + 10#$cm)) -le $((10#$ly * 12 + 10#$lm)) ]; do
            months="$months $(printf '%04d-%02d' "$((10#$cy))" "$((10#$cm))")"
            cm=$((10#$cm + 1)); if [ "$cm" -gt 12 ]; then cm=1; cy=$((cy + 1)); fi
          done
          echo "months=$(echo "$months" | xargs)" >> "$GITHUB_OUTPUT"
          echo "collecting window $START .. $END (months:$months)"

      # ---- collectors (each skips gracefully when its secret is absent)
      - name: Collect AWS
        if: ${{ env.COLLECT == 'true' && env.AWS_ACCESS_KEY_ID != '' }}
        run: go run ./cmd/costctl collect-aws --start ${{ steps.win.outputs.start }} --end ${{ steps.win.outputs.end }}

      - name: Set up GCP credentials
        if: ${{ env.COLLECT == 'true' && env.GCP_SA_KEY != '' }}
        run: |
          # GCP_SA_KEY may be a service-account key OR a user ADC file — the Go
          # BigQuery client accepts both via GOOGLE_APPLICATION_CREDENTIALS.
          printf '%s' "$GCP_SA_KEY" > "$RUNNER_TEMP/gcp-creds.json"
          chmod 600 "$RUNNER_TEMP/gcp-creds.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/gcp-creds.json" >> "$GITHUB_ENV"

      - name: Collect GCP (all months in window)
        if: ${{ env.COLLECT == 'true' && env.GCP_SA_KEY != '' }}
        run: |
          for m in ${{ steps.win.outputs.months }}; do
            echo "== collect-gcp $m =="
            go run ./cmd/costctl collect-gcp --project "$GOOGLE_CLOUD_PROJECT" --period "$m"
          done

      - name: Collect DigitalOcean
        if: ${{ env.COLLECT == 'true' && env.DIGITALOCEAN_TOKEN != '' }}
        run: go run ./cmd/costctl collect-do --preview

      - name: Collect IBM Power
        if: ${{ env.COLLECT == 'true' && env.IBMCLOUD_API_KEY != '' }}
        run: go run ./cmd/costctl collect-ibm --provider ibm-power --start ${{ steps.win.outputs.start }} --end ${{ steps.win.outputs.end }}

      - name: Collect IBM Z
        if: ${{ env.COLLECT == 'true' && env.IBM_Z_API_KEY != '' }}
        env:
          IBMCLOUD_API_KEY: ${{ secrets.IBM_Z_API_KEY }}
        run: go run ./cmd/costctl collect-ibm --provider ibm-z --account 6efe35b964de46b0924c2e95fe410903 --start ${{ steps.win.outputs.start }} --end ${{ steps.win.outputs.end }}

      - name: Collect Fastly
        if: ${{ env.COLLECT == 'true' && env.FASTLY_API_TOKEN != '' }}
        run: go run ./cmd/costctl collect-fastly --start ${{ steps.win.outputs.start }} --end ${{ steps.win.outputs.end }}

      # ---- report + dashboard JSON + XLSX
      - name: Generate report
        if: ${{ env.COLLECT == 'true' }}
        run: go run ./cmd/costctl report

      # ---- commit updated data back (file-based store lives in the repo)
      - name: Commit updated data
        if: ${{ env.COLLECT == 'true' }}
        run: |
          git config user.name "cost-bot"
          git config user.email "cost-bot@users.noreply.github.com"
          git add data web/public/dashboard.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: daily cost data update $(date -u +%F)"
            git push
          else
            echo "no data changes"
          fi

      # ---- build + deploy GitHub Pages
      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # ---- Slack budget alerts
      - name: Slack alert
        if: ${{ env.COLLECT == 'true' && env.SLACK_WEBHOOK_URL != '' }}
        run: go run ./cmd/costctl alert --webhook "$SLACK_WEBHOOK_URL"


