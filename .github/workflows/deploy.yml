name: build-and-deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Go build & test
        run: |
          go build ./...
          go test ./...

      # Regenerate the dashboard JSON + XLSX from the committed data store so the
      # published site always reflects data/. ASOF can be overridden via the
      # workflow_dispatch input in future iterations.
      - name: Generate report
        run: |
          go run ./cmd/costctl report \
            --data ./data \
            --json web/public/dashboard.json \
            --xlsx reports/report.xlsx

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: xlsx-report
          path: reports/report.xlsx

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

