name: budget-alerts

# Runs on a schedule to check budget utilization and post Slack alerts.
# Configure the SLACK_WEBHOOK_URL repository secret to enable notifications.
on:
  schedule:
    - cron: "0 8 1 * *" # 08:00 UTC on the 1st of each month
  workflow_dispatch:

permissions:
  contents: read

jobs:
  alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Check budgets and notify Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: go run ./cmd/costctl alert --data ./data

